name: CI

on:
  push:
    branches: [main, master, develop]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

env:
  GO_VERSION: "1.24"

defaults:
  run:
    working-directory: asf-tui

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: asf-tui/go.sum
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          working-directory: asf-tui

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: asf-tui/go.sum
      - name: Build
        run: go build -v -o asf .
      - name: Check binary
        run: ./asf --version

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: asf-tui/go.sum
      - name: Test
        run: go test ./... -v -count=1 -timeout 120s

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint, build, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: asf-tui/go.sum
      - name: Build binaries
        run: |
          mkdir -p dist
          V="ASF-${GITHUB_REF_NAME}-"
          LDFLAGS="-s -w -X main.ASFVersion=${GITHUB_REF_NAME#v}"
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -ldflags="${LDFLAGS}" -o "dist/${V}linux-amd64" .
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -trimpath -ldflags="${LDFLAGS}" -o "dist/${V}linux-arm64" .
          GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -ldflags="${LDFLAGS}" -o "dist/${V}darwin-amd64" .
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build -trimpath -ldflags="${LDFLAGS}" -o "dist/${V}darwin-arm64" .
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -ldflags="${LDFLAGS}" -o "dist/${V}windows-amd64.exe" .
      - name: Generate checksums
        run: cd dist && sha256sum * > checksums.txt
      - name: Generate completion scripts
        run: |
          LINUX_BIN="dist/ASF-${GITHUB_REF_NAME}-linux-amd64"
          chmod +x "${LINUX_BIN}" 2>/dev/null || true
          "${LINUX_BIN}" completion bash > dist/completion.bash 2>/dev/null || true
          "${LINUX_BIN}" completion zsh > dist/completion.zsh 2>/dev/null || true
          "${LINUX_BIN}" completion fish > dist/completion.fish 2>/dev/null || true
      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          files: asf-tui/dist/*
          body_path: release/RELEASE_NOTES_v5.0.3.md
