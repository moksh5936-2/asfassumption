name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Publish
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Restore dependencies
        working-directory: asf-tui
        run: go mod tidy

      - name: Vet
        working-directory: asf-tui
        run: go vet ./...

      - name: Test
        working-directory: asf-tui
        run: go test ./...

      - name: Build
        id: build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        working-directory: asf-tui
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ "$GOOS" = "windows" ]; then
            BINARY="ASF-v${VERSION}-${GOOS}-${GOARCH}.exe"
          else
            BINARY="ASF-v${VERSION}-${GOOS}-${GOARCH}"
          fi
          go build -ldflags="-s -w" -o "../release/${BINARY}" .
          echo "binary=${BINARY}" >> $GITHUB_ENV
          echo "binary=${BINARY}" >> $GITHUB_OUTPUT

      - name: Verify release
        if: matrix.goos != 'windows'
        working-directory: release
        run: |
          ls -la
          bash ../scripts/verify-release.sh "${{ steps.build.outputs.binary }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.goos }}-${{ matrix.goarch }}
          path: release/ASF-*

  checksums:
    name: Generate Checksums
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Flatten artifacts
        working-directory: release
        run: |
          find . -type f -name "ASF-*" -exec mv {} . \;
          rm -rf linux-* darwin-* windows-*
          chmod +x ASF-* 2>/dev/null || true

      - name: Generate checksums
        working-directory: release
        run: sha256sum ASF-* > checksums.txt

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: release/checksums.txt

  github-release:
    name: Create GitHub Release
    needs: checksums
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Flatten and prepare release assets
        working-directory: release
        run: |
          find . -type f \( -name "ASF-*" -o -name "checksums.txt" \) -exec mv {} . \;
          rm -rf linux-* darwin-* windows-* checksums
          chmod +x ASF-* 2>/dev/null || true
          ls -lh

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          gh release create "${VERSION}" \
            --title "ASF ${VERSION}" \
            --notes "See [CHANGELOG.md](CHANGELOG.md) for details." \
            release/ASF-* release/checksums.txt

  build-current-platform:
    name: Build (current platform)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
        goarch: [amd64, arm64]
        exclude:
          - os: ubuntu-latest
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Restore dependencies
        working-directory: asf-tui
        run: go mod tidy

      - name: Vet
        working-directory: asf-tui
        run: go vet ./...

      - name: Test
        working-directory: asf-tui
        run: go test ./...

      - name: Build
        env:
          CGO_ENABLED: '0'
        working-directory: asf-tui
        run: go build -ldflags="-s -w" -o asf-tui .

      - name: Verify build
        working-directory: asf-tui
        run: bash ../scripts/verify-release.sh asf-tui
