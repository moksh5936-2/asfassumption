metadata:
  name: Internet API Database
  version: "1.0"
  compliance:
    - SOC2
components:
  - name: Browser
    type: client
    description: User browser
  - name: APIGateway
    type: api_gateway
    description: API gateway
  - name: WebApp
    type: web_application
    description: Web application
  - name: Database
    type: database
    description: Application database
  - name: Cache
    type: cache
    description: Redis cache
relationships:
  - source: Browser
    target: APIGateway
    protocol: HTTPS
  - source: APIGateway
    target: WebApp
    protocol: HTTPS
  - source: WebApp
    target: Database
    protocol: TLS
  - source: WebApp
    target: Cache
    protocol: TLS
