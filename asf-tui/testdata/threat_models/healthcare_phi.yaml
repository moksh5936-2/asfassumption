metadata:
  name: Healthcare PHI System
  version: "1.0"
  compliance:
    - HIPAA
    - SOC2
    - ISO27001
components:
  - name: Browser
    type: client
    description: User browser
  - name: Auth0
    type: identity_provider
    description: OAuth2 identity provider
  - name: APIGateway
    type: api_gateway
    description: API gateway
  - name: WebApp
    type: web_application
    description: Web application
  - name: PHIDatabase
    type: database
    description: Patient health records
  - name: KMS
    type: encryption_service
    description: Key management
  - name: AuditLog
    type: logging_service
    description: Audit logging
  - name: BackupService
    type: storage_service
    description: Backup service
  - name: AdminConsole
    type: admin_tool
    description: Admin console
relationships:
  - source: Browser
    target: Auth0
    protocol: HTTPS
  - source: Browser
    target: APIGateway
    protocol: HTTPS
  - source: Auth0
    target: APIGateway
    protocol: HTTPS
  - source: APIGateway
    target: WebApp
    protocol: HTTPS
  - source: WebApp
    target: PHIDatabase
    protocol: TLS
  - source: WebApp
    target: KMS
    protocol: TLS
  - source: WebApp
    target: AuditLog
    protocol: TLS
  - source: WebApp
    target: BackupService
    protocol: TLS
  - source: AdminConsole
    target: WebApp
    protocol: HTTPS
  - source: AdminConsole
    target: PHIDatabase
    protocol: TLS
